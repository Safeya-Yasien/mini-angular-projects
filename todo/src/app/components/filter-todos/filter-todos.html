      <option>Sort by: Date</option>
      <option>Sort by: Status</option>

  </div>

  <div class="md:col-span-3">
    <select
      class="w-full px-3 py-2 border border-gray-200 rounded-lg text-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all appearance-none bg-no-repeat bg-right pr-8"
