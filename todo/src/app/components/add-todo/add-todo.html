<form (ngSubmit)="onSubmit()" class="mb-6 bg-white border border-gray-200 rounded-lg p-4 shadow-sm">
  <div class="flex flex-col sm:flex-row gap-3">
    <div class="relative grow">
      <span
        class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-blue-600"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke-width="2"
          stroke="currentColor"
          class="w-5 h-5"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M12 9v6m3-3H9m12 0a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"
          />
        </svg>
      </span>
      <input
        [(ngModel)]="todoTitle"
        #todoInput
        name="todoTitle"
        type="text"
        required
        placeholder="Add a new task..."
        class="w-full pl-10 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-lg text-gray-700 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
      />
    </div>
    <button
      type="submit"
      class="cursor-pointer bg-blue-600 hover:bg-blue-700 text-white font-semibold px-6 py-3 rounded-lg flex items-center justify-center gap-2 transition-colors duration-200 shadow-sm whitespace-nowrap"
    >
      @if (isEditing) {
        <svg
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke-width="2.5"
          stroke="currentColor"
          class="w-4 h-4"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="m16.862 4.487 1.687-1.688a1.875 1.875 0 1 1 2.652 2.652L10.582 16.07a4.5 4.5 0 0 1-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 0 1 1.13-1.897l8.932-8.931Z"
          />
        </svg>
        <span>Update Task</span>
      } @else {
        <svg
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke-width="2.5"
          stroke="currentColor"
          class="w-4 h-4"
        >
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
        </svg>
        <span>Add Task</span>
      }
    </button>
    @if (isEditing) {
      <button
        type="button"
        (click)="cancelEdit()"
        class="cursor-pointer bg-gray-100 hover:bg-gray-200 text-gray-600 font-semibold px-6 py-3 rounded-lg transition-colors duration-200 whitespace-nowrap"
      >
        Cancel
      </button>
    }
  </div>
</form>
